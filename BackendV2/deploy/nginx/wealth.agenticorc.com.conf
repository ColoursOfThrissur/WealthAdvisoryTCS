# Nginx config for wealth.agenticorc.com
# SSL certificates via Let's Encrypt (certbot)

upstream wealth_backend {
    server 127.0.0.1:8001;
}
upstream stockstory_backend {
    server 127.0.0.1:7000;
}
upstream perplexity_backend {
    server 127.0.0.1:8000;
}

# Port 80 - domain: redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name wealth.agenticorc.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# Port 80 - IP / direct access: serve over HTTP (no SSL for raw IP)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;   # catch-all: IP, localhost, or any non-domain request
    root /var/www/wealth-frontend;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
    location /api/ {
        proxy_pass http://wealth_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /stockstory/ {
        proxy_pass http://stockstory_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /ws/ {
        proxy_pass http://wealth_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wealth.agenticorc.com;

    ssl_certificate /etc/letsencrypt/live/wealth.agenticorc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wealth.agenticorc.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/wealth-frontend;
    index index.html;

    # Frontend SPA - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://wealth_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # StockStory (for testing)
    location /stockstory/ {
        proxy_pass http://stockstory_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Perplexity MCP SSE (for testing)
    location /perplexity/ {
        proxy_pass http://perplexity_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://wealth_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
